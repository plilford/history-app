# Monthly data-freshness check for the Ever-When dataset.
#
# Runs on the 1st of every month, plus on-demand via the Actions tab.
# Re-pulls episodic-resource feeds (TRIH RSS), runs monthly_update.py,
# and opens (or updates) a single tracking issue with the findings.
#
# This action does NOT modify the dataset or commit anything — it just
# nudges. Curation decisions still go through the /monthly-update Claude
# Code skill (see .claude/skills/monthly-update/SKILL.md).

name: Monthly data check

on:
  schedule:
    # 06:00 UTC on the 1st of each month.
    - cron: "0 6 1 * *"
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python deps
        working-directory: tools
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run freshness check (no Supabase access)
        id: check
        working-directory: tools
        run: |
          # --no-fetch first to confirm the script runs from cached state;
          # then a real run that re-pulls RSS feeds. Capture JSON for the
          # issue body.
          python -m v2.curation.monthly_update --json > ../monthly_report.json
          # Surface a short summary to the step output.
          python -c "
          import json
          r = json.load(open('../monthly_report.json'))
          new_eps = sum(
              (e.get('new_episodes') or 0)
              for e in r.get('episodic_resources', [])
          )
          ongoing = len(r.get('ongoing_entries', []))
          suspicious = len(r.get('suspicious_living', []))
          print(f'new_episodes={new_eps}')
          print(f'ongoing={ongoing}')
          print(f'suspicious={suspicious}')
          " >> "$GITHUB_OUTPUT"

      - name: Upload report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: monthly-report
          path: monthly_report.json

      - name: Open / update tracking issue
        if: steps.check.outputs.new_episodes != '0' || steps.check.outputs.ongoing != '0' || steps.check.outputs.suspicious != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('monthly_report.json', 'utf-8'));
            const title = `Monthly data check: ${report.generated_at.slice(0, 10)}`;

            const lines = [];
            lines.push('Generated by `.github/workflows/monthly-data-check.yml`.');
            lines.push('');
            lines.push('To act on this, run the `/monthly-update` skill in Claude Code');
            lines.push('inside the project directory — it walks through each finding,');
            lines.push('gets your confirmation, and applies the changes safely.');
            lines.push('');

            // Episodic resources
            const eps = report.episodic_resources || [];
            lines.push(`## Episodic resources (${eps.length})`);
            for (const r of eps) {
              if (r.error) {
                lines.push(`- ⚠️ **${r.name}**: error — ${r.error}`);
              } else if (r.new_episodes > 0) {
                lines.push(`- 🎙️ **${r.name}**: ${r.current_episodes} eps total, **+${r.new_episodes} new** since last update`);
              } else {
                lines.push(`- ✅ **${r.name}**: ${r.current_episodes} eps (no change)`);
              }
            }
            lines.push('');

            // Ongoing
            const ongoing = report.ongoing_entries || [];
            if (ongoing.length > 0) {
              lines.push(`## \`is_ongoing\` entries needing review (${ongoing.length})`);
              for (const e of ongoing) {
                lines.push(`- id=${e.id} **${e.title}** (started ${e.start_year}, ${e.years_ongoing}yr ongoing)`);
              }
              lines.push('');
            }

            // Suspicious living
            const susp = report.suspicious_living || [];
            if (susp.length > 0) {
              lines.push(`## Suspicious "living" entries (${susp.length})`);
              lines.push('Person rows missing end_year despite being born >110yr ago.');
              for (const e of susp) {
                lines.push(`- id=${e.id} **${e.title}** (b. ${e.start_year})`);
              }
              lines.push('');
            }

            const body = lines.join('\n');

            // Look for an existing open issue with our marker.
            const marker = '<!-- monthly-data-check -->';
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'monthly-data-check',
              per_page: 50,
            });
            const stale = existing.data.find((i) => i.body && i.body.includes(marker));

            const fullBody = `${marker}\n${body}`;
            if (stale) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: stale.number,
                title,
                body: fullBody,
              });
              console.log(`Updated issue #${stale.number}`);
            } else {
              const created = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body: fullBody,
                labels: ['monthly-data-check'],
              });
              console.log(`Created issue #${created.data.number}`);
            }
